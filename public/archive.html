<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Archive — Winning Circle</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0f1117;
  --surface: #1a1d27;
  --surface2: #242836;
  --border: #2e3348;
  --text: #e4e7f1;
  --text-dim: #8b8fa7;
  --accent: #6366f1;
  --green: #22c55e;
  --red: #ef4444;
  --radius: 10px;
  --radius-sm: 6px;
}
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 14px;
  line-height: 1.5;
}
.container { max-width: 1200px; margin: 0 auto; padding: 32px 24px; }
.header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; gap: 16px; flex-wrap: wrap; }
.header h1 { font-size: 22px; font-weight: 600; }
.header .meta { color: var(--text-dim); font-size: 13px; }
.back-link { color: var(--text-dim); text-decoration: none; font-size: 13px; padding: 6px 10px; border-radius: var(--radius-sm); }
.back-link:hover { color: var(--text); background: var(--surface); }
.filters { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 16px; display: grid; grid-template-columns: 1fr 1fr 1fr 1fr auto auto; gap: 10px; align-items: end; }
@media (max-width: 900px) { .filters { grid-template-columns: 1fr 1fr; } }
.filter-group label { display: block; font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 6px; }
.filter-group input, .filter-group select {
  width: 100%; padding: 8px 10px; background: var(--surface2); border: 1px solid var(--border);
  border-radius: var(--radius-sm); color: var(--text); font-size: 13px; font-family: inherit;
}
.filter-group input:focus, .filter-group select:focus { outline: none; border-color: var(--accent); }
.btn {
  padding: 8px 14px; border: 1px solid var(--border); background: var(--surface2);
  color: var(--text); border-radius: var(--radius-sm); cursor: pointer; font-size: 13px; font-family: inherit;
  display: inline-flex; align-items: center; gap: 6px;
}
.btn:hover { background: var(--border); }
.btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.btn-primary:hover { background: #5253d3; }
.summary { color: var(--text-dim); font-size: 13px; margin-bottom: 12px; }
.table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
table { width: 100%; border-collapse: collapse; }
thead th {
  text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: .05em;
  color: var(--text-dim); padding: 12px 16px; background: var(--surface2); border-bottom: 1px solid var(--border);
  font-weight: 600;
}
tbody td { padding: 12px 16px; border-bottom: 1px solid var(--border); font-size: 13px; }
tbody tr:last-child td { border-bottom: none; }
tbody tr:hover { background: var(--surface2); }
.title-cell { font-weight: 500; color: var(--text); }
.title-cell .desc { display: block; color: var(--text-dim); font-size: 12px; margin-top: 2px; max-width: 420px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.assignee, .reviewer { display: inline-flex; align-items: center; gap: 6px; }
.avatar { width: 22px; height: 22px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 600; color: #fff; flex-shrink: 0; }
.priority { display: inline-block; padding: 2px 8px; font-size: 11px; font-weight: 600; border-radius: 999px; text-transform: capitalize; }
.priority.low      { background: rgba(139,92,246,.18); color: #a78bfa; }
.priority.medium   { background: rgba(99,102,241,.18); color: #818cf8; }
.priority.high     { background: rgba(245,158,11,.18); color: #fbbf24; }
.priority.urgent   { background: rgba(239,68,68,.20);  color: #f87171; }
.empty { padding: 48px; text-align: center; color: var(--text-dim); font-size: 14px; }
.muted { color: var(--text-dim); }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div>
      <h1>Archive</h1>
      <div class="meta">All completed tasks, searchable and exportable.</div>
    </div>
    <a href="/" class="back-link">&larr; Back to dashboard</a>
  </div>

  <div class="filters">
    <div class="filter-group">
      <label for="filterMember">Assignee</label>
      <select id="filterMember"><option value="">Anyone</option></select>
    </div>
    <div class="filter-group">
      <label for="filterFrom">Completed from</label>
      <input type="date" id="filterFrom">
    </div>
    <div class="filter-group">
      <label for="filterTo">Completed to</label>
      <input type="date" id="filterTo">
    </div>
    <div class="filter-group">
      <label for="filterQ">Search</label>
      <input type="text" id="filterQ" placeholder="Title or description…">
    </div>
    <button class="btn btn-primary" onclick="applyFilters()">Apply</button>
    <button class="btn" onclick="downloadCsv()" title="Download current results as CSV">CSV</button>
  </div>

  <div class="summary" id="summary">Loading…</div>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Title</th>
          <th>Assignee</th>
          <th>Reviewer</th>
          <th>Priority</th>
          <th>Completed</th>
        </tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>
  </div>
</div>

<script>
async function api(url) {
  const res = await fetch(url, { credentials: 'same-origin' });
  if (res.status === 401) { window.location.href = '/login'; return null; }
  if (!res.ok) throw new Error((await res.json().catch(() => ({}))).error || 'Request failed');
  return res.json();
}
function escapeHtml(s) { const d = document.createElement('div'); d.textContent = s == null ? '' : String(s); return d.innerHTML; }
function initials(name) { return name ? name.split(' ').map(n => n[0]).join('').slice(0, 2).toUpperCase() : '?'; }
function fmtDate(s) {
  if (!s) return '—';
  const d = new Date(s.includes('T') ? s : s.replace(' ', 'T') + 'Z');
  if (isNaN(d.getTime())) return s;
  return d.toLocaleString(undefined, { year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
}

function buildQuery() {
  const params = new URLSearchParams();
  const m = document.getElementById('filterMember').value;
  const f = document.getElementById('filterFrom').value;
  const t = document.getElementById('filterTo').value;
  const q = document.getElementById('filterQ').value.trim();
  if (m) params.set('member_id', m);
  if (f) params.set('date_from', f);
  if (t) params.set('date_to', t);
  if (q) params.set('q', q);
  return params;
}

async function applyFilters() {
  const summary = document.getElementById('summary');
  summary.textContent = 'Loading…';
  let rows;
  try {
    rows = await api('/api/tasks/archive?' + buildQuery().toString());
  } catch (e) {
    summary.textContent = 'Failed to load: ' + e.message;
    return;
  }
  if (!rows) return;
  document.getElementById('rows').innerHTML = rows.map(rowHtml).join('') ||
    '<tr><td colspan="5" class="empty">No completed tasks match your filters.</td></tr>';
  summary.textContent = `${rows.length} result${rows.length === 1 ? '' : 's'}`;
}

function rowHtml(t) {
  const assignee = t.member_name
    ? `<span class="assignee"><span class="avatar" style="background:${t.avatar_color || '#6366f1'}">${escapeHtml(initials(t.member_name))}</span>${escapeHtml(t.member_name)}</span>`
    : '<span class="muted">—</span>';
  const reviewer = t.reviewer_name
    ? `<span class="reviewer"><span class="avatar" style="background:${t.reviewer_avatar_color || '#a855f7'}">${escapeHtml(initials(t.reviewer_name))}</span>${escapeHtml(t.reviewer_name)}</span>`
    : '<span class="muted">—</span>';
  const desc = t.description ? `<span class="desc">${escapeHtml(t.description)}</span>` : '';
  return `<tr>
    <td class="title-cell">${escapeHtml(t.title)}${desc}</td>
    <td>${assignee}</td>
    <td>${reviewer}</td>
    <td><span class="priority ${escapeHtml(t.priority || 'medium')}">${escapeHtml(t.priority || 'medium')}</span></td>
    <td>${escapeHtml(fmtDate(t.completed_at))}</td>
  </tr>`;
}

function downloadCsv() {
  const params = buildQuery();
  params.set('format', 'csv');
  window.location.href = '/api/tasks/archive?' + params.toString();
}

(async function init() {
  try {
    const members = await api('/api/members');
    if (members) {
      document.getElementById('filterMember').innerHTML =
        '<option value="">Anyone</option>' +
        members.map(m => `<option value="${m.id}">${escapeHtml(m.name)}</option>`).join('');
    }
  } catch (_) { /* fall through */ }
  applyFilters();
})();
</script>
</body>
</html>
